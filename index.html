<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Power BI</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    button { background: #0078d4; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
    pre { background: white; padding: 15px; border-radius: 5px; border: 1px solid #ddd; overflow-x: auto; font-size: 13px; }
    .ok { background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin: 10px 0; }
    .err { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>🔌 Test Power BI</h2>
  <button onclick="getToken()">Conectar con Microsoft</button>
  <div id="status"></div>
  <pre id="resultado">Esperando conexión...</pre>

<script>
const CONFIG = {
  tenantId:    "e86d49ef-5a5d-4294-9ea1-e794802dbe70",
  clientId:    "4ccaa91a-fe99-442f-81c3-cdd1c2001f3b",
  workspaceId: "00d7dc17-160b-4cf5-9c25-11393f11acb7",
  datasetId:   "b74b3ccc-5968-4a97-aaee-7d99b4b8556c"
};

function getToken() {
  const redirect = encodeURIComponent(window.location.href.split('#')[0]);
  const authUrl = `https://login.microsoftonline.com/${CONFIG.tenantId}/oauth2/v2.0/authorize?client_id=${CONFIG.clientId}&response_type=token&redirect_uri=${redirect}&scope=https://analysis.windows.net/powerbi/api/Dataset.Read.All&response_mode=fragment`;
  window.location.href = authUrl;
}

window.onload = async function() {
  const hash = window.location.hash;
  if (!hash.includes("access_token")) return;
  const token = new URLSearchParams(hash.substring(1)).get("access_token");
  document.getElementById("status").innerHTML = '<div class="ok">✅ Token OK, consultando Power BI...</div>';
  try {
const url = `https://api.powerbi.com/v1.0/myorg/groups/${CONFIG.workspaceId}/datasets`;    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    document.getElementById("resultado").textContent = JSON.stringify(data, null, 2);
    document.getElementById("status").innerHTML = '<div class="ok">✅ Conexión exitosa con Power BI</div>';
  } catch(e) {
    document.getElementById("status").innerHTML = `<div class="err">❌ Error: ${e.message}</div>`;
  }
};
</script>
</body>
</html>
